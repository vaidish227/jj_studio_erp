services:
  backend:
    build: ./backend
    container_name: erp-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: erp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
